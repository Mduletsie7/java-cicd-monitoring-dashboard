spring:
  h2:
    console:
      enabled: true
      path: /h2-console
  datasource:
    url: jdbc:h2:mem:cicd_dashboard
    driver-class-name: org.h2.Driver
    username: SA
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect

logging:
  level:
    com.example.cicd: DEBUG
    org.springframework.web: DEBUG

server:
  port: 8080

# Custom properties
cicd:
  dashboard:
    polling-interval: 60000 # 1 minute
    max-pipeline-history: 100
    alert-email: mdumisidev@gmail.com